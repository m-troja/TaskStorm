version: '3.8'

services:
  taskstorm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskstorm-api
    restart: unless-stopped
    ports:
      - "6901:6901"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TS_HTTP_PORT=6901
      - TS_LOG_DIR=/app/logs
      - TS_LOG_FILENAME=taskstorm
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - TS_DB_HOST=host.docker.internal
      - TS_DB_PORT=5432
      - TS_DB_NAME=taskstorm
      - TS_DB_USER=taskstorm 
      - TS_DB_PASSWORD=${TS_DB_PASSWORD}
    volumes:
      - ./beta-data/logs:/app/logs
      - ./beta-data/uploads:/app/uploads