name: Build and Deploy to Beta

on:
  push:
    branches:
      - dev

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY_BETA }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Copy files to Beta Server
        run: |
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          --exclude='.git' --exclude='**/bin' --exclude='**/obj' \
          ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WORK_DIR }}/

      - name: Create .env file
        run: |
          ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cat <<'EOF' > ${{ secrets.WORK_DIR }}/TaskStorm.API/.env
          ${{ secrets.ENV_FILE }}
          EOF
          "

      - name: Deploy via Docker Compose
        run: |
          ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.WORK_DIR }}/TaskStorm.API && \
            docker-compose down || true && \
            docker-compose up -d --build
          "

      - name: Show containers
        run: |
          ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "docker ps"

      - name: Cleanup
        run: rm -rf ~/.ssh