name: Build and Deploy to Beta
on:
  push:
    branches:
      - dev

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.SSH_PRIVATE_KEY_BETA }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          ssh-keyscan -p 6922 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to Beta Server
        run: |
          rsync -avz -e "ssh -p 6922 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          --exclude='.git' --exclude='**/bin' --exclude='**/obj' \
          ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WORK_DIR }}/

      - name: Deploy via Docker Compose
        run: |
          ssh -p 6922 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.WORK_DIR }} && \
            docker-compose down || true && \
            docker-compose up -d --build && \
            docker ps
          "

      - name: Show containers
        run: |
          ssh -p 6922 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "docker ps"

      - name: Cleanup
        run: rm -rf ~/.ssh