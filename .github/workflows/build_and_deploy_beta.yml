name: Build and Deploy to Beta
on:
  push:
    branches:
      - dev

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY_BETA }}" > ~/.ssh/id_rsa
          
          echo "Host beta-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port 6022
            StrictHostKeyChecking no" > ~/.ssh/config
          
          ssh-keyscan -p 6022 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to Beta Server
        run: |
          rsync -avz --exclude='.git' --exclude='**/bin' --exclude='**/obj' \
          ./ beta-server:/opt/taskstorm/

      - name: Deploy via Docker Compose
        run: |
          ssh beta-server "
            cd /opt/taskstorm &&
            docker compose down &&
            docker compose up -d --build
          "

      - name: Cleanup
        run: rm -rf ~/.ssh