name: Build and Deploy to Beta
on:
  push:
    branches:
      - dev

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.SSH_PRIVATE_KEY_BETA }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          cat <<EOF > ~/.ssh/config
          Host beta-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port 6922
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan -p 6922 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to Beta Server
        run: |
          rsync -avz --exclude='.git' --exclude='**/bin' --exclude='**/obj' \
          ./ beta-server:/opt/taskstorm/

      - name: Deploy via Docker Compose
        run: |
          ssh beta-server "
            cd /opt/taskstorm &&
            docker compose down &&
            docker compose up -d --build
          "

      - name: Cleanup
        run: rm -rf ~/.ssh