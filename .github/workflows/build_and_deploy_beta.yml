name: Build and Deploy to Beta

on:
  push:
    branches:
      - dev

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY_BETA }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT_BETA }} -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create .env locally
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_CONTENT" > ./TaskStorm.API/.env

      - name: Copy files to Beta Server
        run: |
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519" \
          --exclude='.git' --exclude='**/bin' --exclude='**/obj' \
          ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WORK_DIR }}/TaskStorm.API

      - name: Deploy via Docker Compose (Near Zero-Downtime)
        run: |
          ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.WORK_DIR }}/TaskStorm.API && \
            docker-compose up -d --build --remove-orphans
          "

      - name: Show containers status
        run: |
          ssh -p ${{ secrets.SSH_PORT_BETA }} -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.WORK_DIR }}/TaskStorm.API && docker-compose ps"

      - name: Cleanup
        run: rm -rf ~/.ssh